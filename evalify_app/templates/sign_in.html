{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evalify - Sign In</title>
<link rel="icon" type="image/png" href="{% static 'images/evalify_icon.PNG' %}">
<link rel="stylesheet" href="{% static 'css/sign_in_style.css' %}">
</head>
<body>

<div class="signup-container">

  <div class="logo-section">
    <img src="{% static 'images/evalify_icon.PNG' %}" class="logo-img" alt="Evalify Logo">
    <span class="logo-text">Evalify</span>
  </div>

  <div class="signup-card">
    <h2>Sign In To Continue</h2>

    {% if error %}
    <div style="background:rgba(255,80,80,0.15);border:1px solid rgba(255,80,80,0.3);border-radius:8px;padding:12px 16px;margin-bottom:16px;color:#ff6b6b;font-size:14px;">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{% url 'sign_in_html' %}">
      {% csrf_token %}

      <div class="input-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your email address" required>
      </div>

      <div class="input-group">
        <div class="label-row">
          <label>Password</label>
          <span class="toggle-password" id="togglePass">👁 Hide</span>
        </div>
        <input type="password" id="passwordField" name="password" placeholder="Enter your password" required>
      </div>

      <div class="label-row" style="margin-bottom:20px">
        <label style="display:flex;align-items:center;gap:8px;font-size:12px">
          <input type="checkbox" name="remember">
          Remember me
        </label>
        <a href="#" style="color:var(--text-muted);font-size:12px;text-decoration:none">
          Forget your password?
        </a>
      </div>

      <button type="submit" class="submit-btn">Sign In</button>
    </form>

    <p class="login-link" style="margin-top:20px">
      Don't have an account?
      <a href="{% url 'sign_up_html' %}">Sign up</a>
    </p>
  </div>
</div>

<script src="{% static 'js/sign_in_script.js' %}"></script>
</body>
</html>
